<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">

</head>

<body class=" w-29/30 mx-auto bg-amber-50">

    <main class="container mx-auto ">
        <h2 class="font-bold text-green-500 text-[32px] text-center mb-5">Choose Your Trees</h2>

        <div class="grid grid-cols-12 gap-5">

            <!-- categories  -->

            <div class="col-span-3 bg-gray-100 ">
                <div class="space-y-3 sticky top-5">
                    <h2 class="font-bold  text-[24px] text-center ">Categories</h2>
                    <button class="btn btn-primary w-full" id="allTreesBtn">All Trees</button>

                    <!-- cate container -->
                    <div id="categoriesContainer" class=" space-y-3">

                        <!-- categories will be added here  -->
                    </div>

                </div>
            </div>


            <!-- trees -->
            <div class="col-span-6 bg-green-50">

                <!-- trees will render  -->
                <div id="treesContainer" class="grid grid-cols-1 md:grid-cols-3 gap-3">

                    <!-- dynamical items trees  -->

                </div>
                <!-- loading spinner  -->
                <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">

                    <span class="loading loading-dots loading-md"></span>

                </div>
            </div>



            <!-- cart -->
            <div class="col-span-3 bg-blue-200">
                <h2 class="font-bold text-3xl mb-2 ">Cart</h2>
                <div class=" space-y-4">
                    <div id="cartContainer" class=" space-y-3">

                    </div>


                    <!-- empty cart msg  -->

                    <div id="emptyCartMsg" class="text-center hidden">
                        <h2>Your Cart is Empty</h2>
                        <p>Select Trees to Get Started</p>

                    </div>
                    <!-- total -->
                    <div class=" card card-body shadow-2xl bg-green-100 ">
                        <div class="flex justify-between items-center font-bold text-2xl">
                            <span>Total:</span>
                            <span id="totalPrice">$0</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- product details modal  -->
        <!-- Open the modal using ID.showModal() method -->
        <dialog id="tree-details-modal" class="modal">
            <div class="modal-box">

                <!-- Modal Header with Close Button -->
                <div class="flex justify-between items-start mb-4">
                    <h3 class="font-bold text-2xl text-green-700" id="modalTitle">Tree Details</h3>
                    <button class="btn btn-sm btn-circle btn-ghost"
                        onclick="document.getElementById('tree-details-modal').close()">✕</button>
                </div>

                <!-- Modal Content -->
                <div class=" gap-6">
                    <!-- Plant Image -->
                    <img id="modalImage" src="" alt="plant" class="w-full !h-[250px] object-cover rounded-lg mb-12">

                    <!-- Plant Details -->
                    <div class="">
                        <p class="text-sm text-gray-500 mb-2">
                            <span class="font-bold">Category:</span>
                            <span id="modalCategory" class="badge badge-primary"></span>
                        </p>
                        <p class="text-sm text-gray-600 mb-4">
                            <span id="modalDescription"></span>
                        </p>
                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3xl font-bold text-green-600">$<span id="modalPrice">0</span></span>
                        </div>
                    </div>
                </div>


                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>


    </main>


    <script src="./index.js"></script>
</body>

</html>
